<?xml version="1.0" encoding="UTF-8"?>
<!-- mmd2pptx synthetic fixture: Mermaid 11.16-style flowchart semantics; no user data -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" aria-roledescription="flowchart-v2">
  <style>
    rect { fill: #eeeeee; stroke: #111111; }
